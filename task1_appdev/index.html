<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Spider Game</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="game-container">

        <!-- INPUT AREA -->
        <div class="input-box">

            <input
                type="number"
                id="numValue"
                placeholder="enter a number [0-100]"
            >

            <button onclick="calculation()">
                Submit
            </button>

        </div>

        <!-- PLAYER LIVES -->
        <div class="player-lives">
            <span id="userLives"></span>
        </div>

        <!-- BOT LIVES -->
        <div class="bot-lives">
            <span id="botLives"></span>
        </div>

        <!-- OUTPUT -->
        <div id="output"></div>

    </div>

<script src="script.js"></script>

</body>
</html>
