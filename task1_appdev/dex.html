<!DOCTYPE html>
<html lang="en">
<head>
    <p id="hehe"></p>
</head>
<body>
    <h2>
        <input type="number" id="numValue" placeholder="enter a number[0-100]">

        <button onclick="calculation()">Submit</button>

        
    </h2>
    <p id="output"></p>
<script>
    
        let userLife = 3;
        let botLife = 3;

    
    function calculation(){ 
        
        let userNum = Number(document.getElementById("numValue").value);
        let botNum = Math.floor(Math.random() * 101);
        
        let average = (userNum+botNum)/2;
        let spiderNum = 0.8*average.toFixed(2);
        
        let userDis = Math.abs(spiderNum-userNum).toFixed(2);
        let botDis = Math.abs(spiderNum-botNum);
        
        document.getElementById("output").innerHTML = "you entered " + userNum + " and bot entered " + botNum +"<br>average : " + average +"<br>spider Num : " + spiderNum.toFixed(2)
        
        if(userDis>botDis){
            document.getElementById("output").innerHTML += "<br>bot won , you lose 10 points ;("
            
            userLife-=1;

            if(userLife==0){
                document.getElementById("output").innerHTML+="<br>oops you lost ;(<br>game restarted"
                return;
            }
            

        }
        
        else if(botDis==userDis){
            document.getElementById("output").innerHTML += "<br>round tied."
        }
        
        else{
            document.getElementById("output").innerHTML += "<br>you won , bot lost 10 points!!"
            
            botLife -= 1;
            
            if(botLife==0){
                document.getElementById("output").innerHTML+="<br>you won :)<br>game restarted"
                return;
            }
            

        }
        
    }
    
</script>
</body>
</html>
